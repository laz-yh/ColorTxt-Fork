name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            prune_platform: win32
            builder_target: win
            arch: x64
          - os: macos-latest
            name: macOS
            prune_platform: darwin
            builder_target: mac
            arch: arm64
          - os: ubuntu-latest
            name: Linux
            prune_platform: linux
            builder_target: linux
            arch: x64

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # 未配置签名证书时跳过自动签名探测，避免 CI 失败
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match package.json version ${VERSION}"
            exit 1
          fi

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npx electron-vite build

      - name: Prune pack dependencies
        run: node scripts/prune-pack-deps.mjs --platform ${{ matrix.prune_platform }} --arch ${{ matrix.arch }}

      - name: Package and publish to GitHub Releases
        run: npx electron-builder --publish always --${{ matrix.builder_target }} --${{ matrix.arch }}
